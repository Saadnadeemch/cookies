<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      min-height: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    h2 { font-size: 18px; margin-bottom: 4px; color: #fff; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
    .btn {
      width: 100%;
      padding: 14px;
      margin: 6px 0;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-extract { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-download { background: #2d3748; color: #a0aec0; border: 1px solid #4a5568; }
    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      min-height: 40px;
    }
    .status-loading { background: #2d3748; color: #90cdf4; }
    .status-success { background: #22543d; color: #9ae6b4; }
    .status-error { background: #742a2a; color: #feb2b2; }
    .platform-list { margin-top: 12px; }
    .platform-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      margin: 3px 0;
      border-radius: 6px;
      font-size: 12px;
      background: #16213e;
    }
    .platform-name { font-weight: 500; }
    .platform-status { font-size: 11px; }
    .ok { color: #48bb78; }
    .fail { color: #f56565; }
    .summary {
      margin-top: 12px;
      padding: 10px;
      background: #0f3460;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.6;
    }
    .hidden { display: none; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #90cdf4;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .log {
      margin-top: 10px;
      padding: 8px;
      background: #0d1117;
      border-radius: 6px;
      font-size: 10px;
      font-family: monospace;
      max-height: 120px;
      overflow-y: auto;
      color: #8b949e;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>🍪 Buckty Cookie Extractor</h2>
  <p class="subtitle">Open platforms & extract cookies automatically</p>
  
  <button class="btn btn-extract" id="btnExtract">
    Open All Platforms & Extract
  </button>
  
  <button class="btn btn-download" id="btnDownload">
    Download cookies.txt
  </button>
  
  <div class="status hidden" id="status"></div>
  <div class="platform-list hidden" id="platformList"></div>
  <div class="summary hidden" id="summary"></div>
  <div class="log hidden" id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
